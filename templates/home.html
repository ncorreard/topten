<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f0f0f0;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 40px;
        }
        .game-option {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-option h2 {
            color: #2196F3;
            margin-bottom: 15px;
        }
        .game-option p {
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover {
            background: #1976D2;
        }
        .btn.create {
            background: #4CAF50;
        }
        .btn.create:hover {
            background: #45a049;
        }
        .join-form {
            margin-top: 20px;
        }
        .join-input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            margin: 10px;
            width: 200px;
        }
        .join-input:focus {
            border-color: #2196F3;
            outline: none;
        }
        .error {
            color: #f44336;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🃏 Card Drawing Game</h1>

    <div class="game-option">
        <h2>Create New Game</h2>
        <p>Start a fresh game with 10 cards. Share the game key with your teammates!</p>
        <form action="/create_game" method="post">
            <input type="text" name="player_name" placeholder="Your name" class="join-input" required>
            <br>
            <button type="submit" class="btn create">Create Game</button>
        </form>
    </div>

    <div class="game-option">
        <h2>Join Existing Game</h2>
        <p>Enter a game key to join your teammates' game.</p>
        <form action="/join_game" method="post" class="join-form">
            <input type="text" name="player_name" placeholder="Your name" class="join-input" required>
            <br>
            <input type="text" name="game_key" placeholder="Enter game key" class="join-input" required>
            <br>
            <button type="submit" class="btn">Join Game</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
